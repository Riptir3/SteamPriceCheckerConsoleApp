services:
  steam-checker:
    image: ghcr.io/riptir3/steampricecheckerconsoleapp:latest
    container_name: steam-app
    restart: always

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 --cleanup --run-once steam-app
