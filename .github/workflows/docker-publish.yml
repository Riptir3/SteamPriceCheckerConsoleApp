name: Docker and EXE Build

on:
  push:
    branches: [ "main", "master" ] 
    tags:
      - 'v*'
  workflow_dispatch:     

jobs:
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./SteamPriceCheckerConsoleApp 
          file: ./SteamPriceCheckerConsoleApp/Dockerfile
          push: true
          tags: ghcr.io/riptir3/steampricecheckerconsoleapp:latest   

  build-exe:
    runs-on: windows-latest
    permissions:
      contents: write 
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Kell a verziózáshoz

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish EXE
        shell: pwsh
        run: |
          # 1. Meghatározzuk a verziót. Ha nincs tag, legyen 1.4.1 (vagy amit akarsz alapnak)
          $VERSION = "1.4.1"
          if ("${{ github.ref_type }}" -eq "tag") {
            $VERSION = "${{ github.ref_name }}".TrimStart('v')
          }
          
          Write-Host "FORDÍTÁS EZZEL A VERZIÓVAL: $VERSION"

          # 2. Fordítás - Kifejezetten átadjuk a verziót 3 helyen is!
          dotnet publish ./SteamPriceCheckerConsoleApp/SteamPriceCheckerConsoleApp.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=$VERSION `
            -p:AssemblyVersion=$VERSION `
            -p:FileVersion=$VERSION `
            -o ./publish

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        # CSAK akkor fusson, ha TAG-et hoztál létre (v1.4.1 stb.)
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: publish/SteamPriceCheckerConsoleApp.exe
          tag_name: ${{ github.ref_name }}
          name: "Verzió ${{ github.ref_name }}"
          body: "Automatikusan generált EXE verzió: ${{ github.ref_name }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
