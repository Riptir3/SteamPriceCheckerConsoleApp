name: Docker and EXE Build

on:
  push:
    branches: [ "main", "master" ] 
    tags:
      - 'v*'
  workflow_dispatch:     

jobs:
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./SteamPriceCheckerConsoleApp 
          file: ./SteamPriceCheckerConsoleApp/Dockerfile
          push: true
          tags: ghcr.io/riptir3/steampricecheckerconsoleapp:latest   

  build-exe:
    runs-on: windows-latest
    permissions:
      contents: write 
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish EXE
        shell: pwsh
        run: |
          # Verzió kiszámítása
          $CLEAN_VERSION = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}".TrimStart('v') } else { "0.0.1" }
          
          # Publish futtatása - FIGYELJ AZ ÚTVONALRA!
          dotnet publish ./SteamPriceCheckerConsoleApp/SteamPriceCheckerConsoleApp.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=$CLEAN_VERSION `
            -o ./publish
          
          # ELLENŐRZÉS: Kiírjuk a mappa tartalmát, hogy lássuk a logban, ott van-e az EXE
          Write-Host "Mappa tartalma a publish után:"
          Get-ChildItem ./publish

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          # Pontosan ugyanazt a mappát használjuk, amit fent megadtunk (-o ./publish)
          files: publish/SteamPriceCheckerConsoleApp.exe
          tag_name: ${{ github.ref_name }}
          name: "Verzió ${{ github.ref_name }}"
          body: "Automatikusan generált frissítés. SHA: ${{ github.sha }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
